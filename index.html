<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Life OS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ---------- DESIGN SYSTEM ---------- */

:root{

--bg:#0B0B0B;
--surface:#151515;
--surface2:#1E1E1E;

--border:rgba(255,255,255,0.08);

--text:#ECEBE6;
--text2:#A0A097;

--green:#4ADE80;
--greenSoft:rgba(74,222,128,0.08);

--radius:18px;

}

/* ---------- BASE ---------- */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:'DM Sans',sans-serif;

background:

radial-gradient(circle at 20% 20%, rgba(74,222,128,0.05), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(74,222,128,0.03), transparent 40%),
var(--bg);

color:var(--text);

min-height:100vh;

-webkit-font-smoothing:antialiased;

}

/* ---------- LAYOUT ---------- */

.container{

max-width:1200px;
margin:auto;
padding:30px 20px 80px;

}

/* ---------- HEADER ---------- */

.header{

margin-bottom:40px;

}

.title{

font-family:'Cormorant Garamond',serif;
font-size:48px;
font-weight:300;
letter-spacing:-1px;

}

.subtitle{

margin-top:6px;
color:var(--text2);
font-size:14px;

}

/* ---------- GRID ---------- */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:16px;

}

/* ---------- CARD ---------- */

.card{

background:var(--surface);

border:1px solid var(--border);

border-radius:var(--radius);

padding:22px;

transition:0.25s;

backdrop-filter:blur(12px);

}

.card:hover{

border-color:rgba(255,255,255,0.15);

transform:translateY(-4px);

box-shadow:

0 10px 30px rgba(0,0,0,0.5),
0 0 25px rgba(74,222,128,0.04);

}

.card-label{

font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
color:var(--text2);
margin-bottom:10px;

}

/* ---------- NUMBERS ---------- */

.big{

font-family:'Cormorant Garamond',serif;

font-size:56px;

line-height:1;

}

.green{

color:var(--green);

}

/* ---------- BUTTON ---------- */

button{

border:none;

background:var(--green);

color:#04210f;

font-weight:600;

padding:10px 16px;

border-radius:10px;

cursor:pointer;

transition:0.2s;

}

button:hover{

transform:translateY(-1px);
box-shadow:0 4px 20px rgba(74,222,128,0.3);

}

/* ---------- INPUT ---------- */

input{

width:100%;

background:var(--surface2);

border:1px solid var(--border);

border-radius:10px;

padding:10px;

color:white;

font-size:16px;

outline:none;

}

input:focus{

border-color:var(--green);

}

/* ---------- LIST ---------- */

.list{

margin-top:10px;

display:flex;
flex-direction:column;
gap:8px;

}

.item{

background:var(--surface2);

padding:10px;

border-radius:10px;

display:flex;
justify-content:space-between;

}

/* ---------- MOBILE ---------- */

@media(max-width:700px){

.title{
font-size:34px;
}

}

</style>

</head>


<body>

<div class="container">

<div class="header">

<div class="title" id="hello">Bonjour</div>
<div class="subtitle" id="date"></div>

</div>

<div class="grid">

<div class="card">

<div class="card-label">Score de vie</div>

<div class="big green" id="score">75</div>

</div>

<div class="card">

<div class="card-label">Argent</div>

<div class="big" id="money">0€</div>

</div>

<div class="card">

<div class="card-label">Habitudes aujourd'hui</div>

<div class="big" id="habitsDone">0</div>

</div>

</div>

<br>

<div class="card">

<div class="card-label">Ajouter une transaction</div>

<br>

<input id="name" placeholder="description">

<br><br>

<input id="amount" type="number" placeholder="montant">

<br><br>

<button onclick="addTransaction()">Ajouter</button>

<div class="list" id="transactions"></div>

</div>

</div>


<script>

/* ---------- DATE ---------- */

const d = new Date()

document.getElementById("date").innerText =
d.toLocaleDateString("fr-FR",{
weekday:"long",
day:"numeric",
month:"long"
})

/* ---------- STORAGE ---------- */

let data = JSON.parse(localStorage.getItem("lifeOS")) || {
money:0,
transactions:[]
}

/* ---------- RENDER ---------- */

function render(){

document.getElementById("money").innerText =
data.money+"€"

const list=document.getElementById("transactions")

list.innerHTML=""

data.transactions.forEach(t=>{

const div=document.createElement("div")

div.className="item"

div.innerHTML=

`<span>${t.name}</span>
<span>${t.amount}€</span>`

list.appendChild(div)

})

localStorage.setItem("lifeOS",JSON.stringify(data))

}

/* ---------- ADD ---------- */

function addTransaction(){

const name=document.getElementById("name").value
const amount=parseFloat(document.getElementById("amount").value)

if(!name || !amount) return

data.transactions.unshift({name,amount})

data.money+=amount

document.getElementById("name").value=""
document.getElementById("amount").value=""

render()

}

render()

</script>

</body>
</html>
